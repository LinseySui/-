"植物",icon:"🌱",description:"生命力、成长、滋养、收获"},buildings:{name:"建筑",icon:"🏛️",description:"安全感、连接、界限、精神追求"},nature:{name:"自然",icon:"🌍",description:"力量、情感流动、稳定、能量"},transport:{name:"交通",icon:"🚗",description:"人生方向、过渡、自由"},objects:{name:"物品",icon:"📦",description:"日常需求、能力、保护、价值"},landscape:{name:"景观",icon:"🛤️",description:"选择、界限、机会、指引"}},Pd=[{id:"intro1",title:"什么是箱庭疗法？",category:"intro",icon:"🏖️",content:`箱庭疗法（Sandplay Therapy），又称沙盘游戏，是一种表达性心理治疗方法。它由瑞士心理学家多拉·卡尔夫（Dora Kalff）创立，基于荣格心理学理论。

在箱庭疗法中，来访者在一个装有沙子的矩形箱子里，使用各种微缩模型（沙具）来创造场景。这个过程不需要言语表达，而是通过象征性的方式呈现内心世界。

**箱庭疗法的核心原理：**

1. **自由与受保护的空间**：治疗师提供一个安全、接纳的环境，让来访者自由表达。

2. **象征性表达**：沙具代表内在的心理内容，通过摆放沙具，潜意识内容得以意识化。

3. **自我治愈倾向**：荣格认为，每个人都有自我治愈的内在力量，箱庭可以激活这种力量。

4. **非言语沟通**：对于难以用语言表达的情感和经历，箱庭提供了一种替代性的表达方式。

**箱庭疗法适合：**
- 儿童（特别是语言表达能力有限的儿童）
- 经历过创伤的人
- 感到焦虑、抑郁的人
- 希望进行自我探索的人
- 人际关系困难的人

在这个电子箱庭中，你可以体验这种神奇的自我表达方式，创造属于你的内心世界。`},{id:"intro2",title:"如何进行箱庭体验？",category:"intro",icon:"🤲",content:`进行箱庭体验是一个简单而深刻的过程。以下是一些指引，帮助你更好地使用这个电子箱庭：

**准备阶段：**
1. 找一个安静、不被打扰的时间
2. 深呼吸几次，让自己放松下来
3. 不要预设目标，让内心自然浮现

**创作阶段：**
1. 选择一个吸引你的场景（沙漠、草地、雪地、海边、岛屿）
2. 浏览沙具，选择那些"呼唤"你的物品
3. 不需要思考太多，跟随直觉摆放
4. 可以移动、调整，直到感觉"对了"

**完成阶段：**
1. 给你的作品起一个名字
2. 从各个角度观察你的创作
3. 注意你的感受和想法

**观察要点：**
- 你选择了哪些沙具？
- 它们的位置和关系如何？
- 作品中有什么故事在发生？
- 你认同作品中的哪个部分？

**温馨提示：**
没有"正确"的摆放方式。你的箱庭是独一无二的，它反映的是你当下的内心世界。保持好奇和接纳的态度，就是最好的体验方式。`},{id:"symbols1",title:"人物沙具的象征意义",category:"symbols",icon:"👥",content:`人物沙具在箱庭中通常代表不同面向的自我，或重要的人际关系。

**儿童形象：**
- 代表内在的童真、未成熟的部分
- 可能反映对童年经历的回忆
- 象征新的可能性和成长潜力

**成人形象：**
- 代表当下的自我状态
- 反映社会角色和责任
- 可能代表理想自我或应该成为的样子

**老人形象：**
- 象征内在智慧和经验
- 代表生命历程的回顾
- 可能反映对未来的担忧或期待

**权威人物（国王、女王、超级英雄）：**
- 代表内在的力量和权威
- 可能反映对权力的态度
- 象征理想化的自我

**职业人物（医生、老师、警察）：**
- 反映对这些角色的认同或需求
- 可能代表内在的帮助者或评判者
- 象征特定的功能或能力

**神话/灵性人物（天使、骷髅）：**
- 连接深层潜意识和集体无意识
- 代表灵性追求或阴影面向
- 象征生命的终极议题（死亡、超越）

**观察提示：**
注意人物之间的关系——他们是靠近还是远离？是互动还是孤立？这往往反映了你内在的关系模式。`},{id:"symbols2",title:"动物沙具的象征意义",category:"symbols",icon:"🐾",content:`动物在箱庭中通常代表本能、情感特质和阴影面向。不同的动物携带不同的象征意义。

**家养动物（狗、猫、马）：**
- 狗：忠诚、陪伴、友谊
- 猫：独立、直觉、神秘
- 马：力量、自由、本能能量

**野生动物（狮子、熊、狼）：**
- 狮子：力量、勇气、王者气质
- 熊：力量、保护、内省（冬眠）
- 狼：本能、群体、野性

**小动物（兔子、鸟、蝴蝶）：**
- 兔子：敏感、脆弱、繁殖力
- 鸟：自由、灵性、超越
- 蝴蝶：转变、美丽、重生

**危险动物（蛇、蜘蛛、蝎子）：**
- 蛇：智慧、转变、阴影、治愈
- 蜘蛛：创造、命运、母亲原型
- 这些动物往往代表被压抑的恐惧或力量

**水生动物（鱼、海龟）：**
- 鱼：潜意识、情感、流动
- 海龟：耐心、保护、智慧

**神话动物（龙、凤凰）：**
- 龙：力量、转变、守护
- 凤凰：重生、不屈、转化

**观察提示：**
注意动物的状态——它们是安静的、奔跑的、还是攻击的？这反映了你内在能量的状态。动物之间的关系也很重要，它们和谐相处还是相互威胁？`},{id:"symbols3",title:"建筑和自然沙具的象征意义",category:"symbols",icon:"🏔️",content:`建筑代表内在结构和安全感，自然元素代表生命力和情感状态。

**建筑类：**

*房子*：最核心的建筑，代表自我和安全感
- 房子的状态反映内在安全感
- 门窗代表对外界的开放程度
- 大小和风格反映自我认知

*城堡*：防御和理想
- 可能反映强烈的防御需要
- 也可能代表对理想生活的向往

*桥梁*：连接和过渡
- 代表不同部分的连接
- 象征人生阶段的过渡
- 可能反映沟通的需要

*宗教建筑*：精神追求
- 代表灵性需要和信仰
- 反映对超越性意义的追寻

**自然类：**

*山*：挑战和目标
- 代表需要克服的困难
- 也象征追求的目标

*水*：情感和潜意识
- 静水：平静的情感
- 流动的水：情感的流动
- 汹涌的水：强烈的情绪

*太阳和月亮*：意识和潜意识
- 太阳：意识、理性、父亲
- 月亮：潜意识、感性、母亲

*树*：生命力和成长
- 大树：稳定的自我
- 小树苗：新的成长
- 枯树：生命力的枯竭

**观察提示：**
建筑和自然的比例关系很重要。过多的建筑可能反映过度控制，过多的自然可能反映缺乏结构。`},{id:"explore1",title:"通过箱庭探索内在冲突",category:"exploration",icon:"⚖️",content:`内在冲突是成长的动力，也是痛苦的来源。箱庭可以帮助我们看见、理解并整合这些冲突。

**常见的内在冲突主题：**

1. **对立的力量**
   - 作品中出现明显对立的元素（如攻击vs保护）
   - 可能反映理性与感性的冲突
   - 或责任与欲望的拉扯

2. **封闭与开放**
   - 被围栏包围 vs 开放的空间
   - 反映对外界的态度和安全感

3. **动态与静态**
   - 奔跑的动物 vs 静止的人物
   - 可能反映内在能量的状态

4. **过去与未来**
   - 作品左侧（过去）vs 右侧（未来）
   - 反映时间维度的张力

**如何探索冲突：**

*第一步：识别冲突*
- 观察作品中对立或分离的元素
- 注意让你感到紧张的部分

*第二步：理解双方*
- 每个对立面在保护什么？
- 它们各自的需求是什么？
- 它们如何试图帮助你？

*第三步：寻找连接*
- 作品中是否有连接的元素？
- 如何创造更多连接？
- 整合的可能性在哪里？

*第四步：重新创作*
- 尝试调整作品，创造更多和谐
- 观察调整时的感受和阻力

**温馨提示：**
冲突不是需要消灭的敌人，而是需要理解的信使。每个冲突的部分都在试图保护你或满足你的某种需要。`},{id:"explore2",title:"通过箱庭探索人际关系",category:"exploration",icon:"💞",content:`箱庭是探索人际关系的绝佳工具。我们在作品中摆放的人物关系，往往反映了我们内在的关系模式。

**关系模式的呈现：**

1. **距离与亲密度**
   - 人物之间的距离反映心理距离
   - 过近可能反映融合的需要或焦虑
   - 过远可能反映回避或孤立

2. **互动与孤立**
   - 人物是相互朝向还是背对？
   - 有互动的迹象还是各自孤立？
   - 反映你对关系的期待和恐惧

3. **权力动态**
   - 人物的大小、位置反映权力感
   - 高处 vs 低处
   - 中心 vs 边缘

4. **关系三角**
   - 三个人的关系动态
   - 可能反映家庭三角或朋友关系

**常见的关系主题：**

*被忽视的孩子*
- 作品中的儿童被放置在角落
- 可能反映内在受伤的儿童部分

*权威与服从*
- 大人物面对小人物
- 反映与权威的关系模式

*保护与被保护*
- 有保护性元素围绕脆弱元素
- 反映内在的保护机制

*分离与团聚*
- 人物是聚集还是分散
- 反映对亲密和独立的需求

**探索练习：**
1. 创作一个关于"重要关系"的箱庭
2. 观察你在关系中的位置
3. 尝试调整，看看什么是舒适的
4. 注意调整时的情绪和想法`},{id:"mental1",title:"情绪管理与自我关怀",category:"mental-health",icon:"🌈",content:`箱庭不仅是探索工具，也是情绪调节和自我关怀的有效方法。

**用箱庭调节情绪：**

*情绪表达*
- 当情绪难以言说时，用沙具表达
- 愤怒可以用火山、火焰、武器
- 悲伤可以用雨、孤独的动物
- 焦虑可以用混乱的摆放、迷宫

*情绪外化*
- 将情绪放在沙具上，与情绪保持距离
- 观察情绪，而不是被情绪淹没
- 创造与情绪的关系

*情绪转化*
- 创作情绪箱庭后，尝试添加转化的元素
- 如黑暗中加入一盏灯
- 混乱中加入秩序

**自我关怀的箱庭练习：**

*安全基地*
- 创作一个让你感到安全的场景
- 包含让你感到舒适的元素
- 在需要时，可以在心中回到这里

*内在帮助者*
- 选择一个代表内在力量的沙具
- 放置在需要支持的地方
- 记住你并不孤单

*滋养场景*
- 创作一个充满滋养的场景
- 食物、温暖、舒适的环境
- 满足内在的需要

*未来愿景*
- 创作你希望成为的样子
- 包含代表成长和希望的元素
- 让愿景引导你

**日常练习建议：**
- 每天花10分钟创作一个小箱庭
- 记录创作前后的情绪变化
- 定期回顾，观察变化模式

**温馨提示：**
箱庭是自我关怀的工具，不是自我评判的工具。没有"应该"怎样，只有"真实"怎样。接纳就是改变的开始。`}],eN={desert:"🏜️",grass:"🌿",snow:"❄️",beach:"🏖️",island:"🏝️"},tN={desert:"from-[#E6D5AC] to-[#D4C49A]",grass:"from-[#B8D4A8] to-[#A8C498]",snow:"from-[#F0F4F8] to-[#E0E4E8]",beach:"from-[#E8DCC8] to-[#D8CCC0]",island:"from-[#D4E8C8] to-[#C4D8B8]"};function nN({onBack:n,onSelect:s}){return f.jsxs("div",{"code-path":"src\\sections\\SceneSelectPage.tsx:30:5",className:"min-h-screen bg-gradient-to-br from-[#FAF7F2] to-[#F5E6D3] p-6",children:[f.jsxs(ce.div,{"code-path":"src\\sections\\SceneSelectPage.tsx:32:7",initial:{opacity:0,y:-20},animate:{opacity:1,y:0},className:"flex items-center mb-8",children:[f.jsxs(fe,{"code-path":"src\\sections\\SceneSelectPage.tsx:37:9",variant:"ghost",onClick:n,className:"text-[#7A6B5A] hover:text-[#5D4E37] hover:bg-[#8B7355]/10",children:[f.jsx(wa,{"code-path":"src\\sections\\SceneSelectPage.tsx:42:11",className:"w-5 h-5 mr-1"}),"返回"]}),f.jsx("h1",{"code-path":"src\\sections\\SceneSelectPage.tsx:45:9",className:"text-2xl font-bold text-[#5D4E37] ml-4",children:"选择场景"})]}),f.jsxs(ce.p,{"code-path":"src\\sections\\SceneSelectPage.tsx:49:7",initial:{opacity:0},animate:{opacity:1},transition:{delay:.1},className:"text-[#7A6B5A] text-center mb-10 max-w-lg mx-auto",children:["选择一个你喜欢的场景作为创作的背景。",f.jsx("br",{"code-path":"src\\sections\\SceneSelectPage.tsx:56:9"}),"不同的场景会唤起不同的内在体验。"]}),f.jsxs("div",{"code-path":"src\\sections\\SceneSelectPage.tsx:61:7",className:"max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6",children:[Za.map((o,r)=>f.jsxs(ce.div,{"code-path":"src\\sections\\SceneSelectPage.tsx:63:11",initial:{opacity:0,y:30},animate:{opacity:1,y:0},transition:{delay:.1+r*.1,duration:.5},whileHover:{scale:1.03,y:-5},whileTap:{scale:.98},onClick:()=>s(o.id),className:`cursor-pointer group relative overflow-hidden rounded-2xl bg-gradient-to-br ${tN[o.id]} p-6 shadow-md hover:shadow-xl transition-all duration-300`,children:[f.jsx("div",{"code-path":"src\\sections\\SceneSele 心觉察","荣格心理学","本我追寻","灵性成长"],shadow:"对真实自我的逃避与否认，害怕面对内在的黑暗面。",gift:"深刻的自我觉察能力，能够在混乱中触及内在的核心稳定。",image:"./oh-cards/tuka/1.jpg",imageDescription:"一个由紫色渐变到红色的多层人形轮廓，象征着灵魂的层次与内在能量的流动。",interpretation:{subconscious:"你的内心正在呼唤你回归核心。这张图卡象征着自性（Self）的显现，那些层层叠叠的轮廓代表你内在不同面向的自己。此刻的你，可能正处于重新认识自己的转折点。",emotion:"平静中带着一丝悸动。当我们触及内在自我时，往往会感受到一种深沉的归属感，也可能伴随着对未知自我的敬畏。",relationship:"在人际关系中，这张牌邀请你思考：你是否常常在扮演别人期待的角色，而遗忘了真正的自己？真实的连结始于真实的自我呈现。",growth:"成长的方向是逐渐剥去外在的标签与面具，勇敢地活在核心自我之中。你不需要成为更好的人，你只需要成为更真实的自己。"},questions:["当你凝视这个多层的人形轮廓时，你最先被哪一层吸引？它让你联想到自己的哪个面向？","在日常生活中，你有多常允许自己回到这个核心自我？","如果这个内在自我会说话，它此刻最想对你说的一句话是什么？"]},{id:"img2",realId:10,name:"滋养倾注",keywords:["给予","接受","流动","关怀","滋养"],deepSeekKeywords:["给予与接受","情感流动","自我关怀","关系滋养","爱的语言","心理界限","能量交换"],shadow:"过度付出导致的耗竭，或害怕接受而封闭自己的心。",gift:"懂得在给予与接受之间找到平衡，让爱与资源流动起来。",image:"./oh-cards/tuka/10.jpg",imageDescription:"一只手倾斜著水壶，将清澈的水缓缓倒入玻璃杯中，象征着能量的传递与情感的流动。",interpretation:{subconscious:"你的内在正在经历一场关于‘给予与接受’的课题。这张图卡可能反映了你与他人之间的能量流动状态，也可能是你对自己滋养方式的隐喻。",emotion:"温柔、被照顾的感觉，或者一种想要照顾某人的渴望。水的流动本身就能带来平静与释放。",relationship:"在关系中，你更像那个倒水的人，还是等待被注满的杯子？健康的关系需要双方都能给予，也都能接受。",growth:"学会接受别人的好意，和学会适度地付出一样重要。成长是让爱成为一条流动的河，而不是一潭死水。"},questions:["此刻的你，更像那个倒水的水壶，还是那个等待被注满的杯子？","你最近一次感到被深深滋养是什么时候？是谁给了你这份滋养？","在给予的过程中，你是否也允许自己接受回报？"]},{id:"img3",realId:20,name:"冲突共舞",keywords:["对立","张力","边界","力量","互动"],deepSeekKeywords:["内在冲突","关系张力","边界设定","攻击与防御","情绪调节","非暴力沟通","阴影整合"],shadow:"对冲突的过度恐惧或过度沉迷，导致关系的撕裂或自我的耗损。",gift:"冲突中蕴含着改变的动力，它让我们有机会重新定义关系的边界与规则。",image:"./oh-cards/tuka/20.jpg",imageDescription:"两个颜色鲜明的人形在黄色背景中相互推搦，红色与绿色的对比象征着对立双方的张力与能量交锋。",interpretation:{subconscious:"你的内心或生活中正存在着某种对立与张力。这不一定是坏事，因为冲突往往是改变的前奏。这张图卡在邀请你去看见：这场‘共舞’的背后，各自想要守护的是什么？",emotion:"紧绷、愤怒、无力，或者一种棋逢对手的兴奋感。冲突唤醒了我们最原始的情绪反应。",relationship:"这张牌可能映照了你某段关系中的权力动态。无论是亲密关系、职场关系还是家庭关系，冲突的发生总是为了某种未被满足的需求。",growth:"成长不是消灭冲突，而是学会与冲突共处。试着将这场共舞视为一次对话的机会，而非一场你死我活的战争。"},questions:["这两个人形让你联想到生活中的哪两种力量或哪两个人？","如果这场冲突有一个目的，你觉得它想让你学会什么？","在对立中，你通常会选择迎战、逃避，还是试图调停？"]},{id:"img4",realId:30,name:"深海潜行",keywords:["潜意识","探索","危险","诱惑","未知"],deepSeekKeywords:["潜意识探索","未知领域","本能驱力","深海象征","心理冒险","阴影面对","内在智慧"],shadow:"沉溺于潜意识的深渊而逃避现实，或被未知的恐惧所淹没。",gift:"拥有深入潜意识探索的勇气，能够从深处打捞出被遗忘的宝藏。",image:"./oh-cards/tuka/30.jpg",imageDescription:"一个潜水员在水下仰望着悬垂的鱼钩，周围游弋著鱼群的剪影，象征着潜意识深处的诱惑与探索。",interpretation:{subconscious:"你的内心正潜入一片未知的深海。鱼钩象征着某种潜意识中的诱惑或未解的课题，而那些游动的鱼群则代表你内心深处丰富的情感与直觉。",emotion:"好奇与不安交织。深海既是恐惧的来源，也是智慧的宝库。你可能正在面对一些平时不愿意触及的情绪。",relationship:"在人际关系中，你是否常常感觉‘看不清楚’对方的真实意图，或者对方也看不清楚你？这张牌邀请你更深地潜入关系的潜意识层面。",growth:"成长需要勇气去潜入自己的深海。你不需要一次就触及海底，每一次下潜，都会让你带回一些新的认识与整合。"},questions:["对你来说，那片深海代表着什么？是恐惧、诱惑，还是智慧？","鱼钩在诱惑你什么？你愿意咬钩，还是选择游开？","如果你从深海中带回一个宝藏，你希望它是什么？"]},{id:"img5",realId:40,name:"锤击劳作",keywords:["努力","建构","破坏","付出","意志"],deepSeekKeywords:["勤奋与劳累","建设与破坏","意志力","身体劳动","目标导向","成就感","过度努力"],shadow:"用盲目的忙碌来逃避内心的空虚，或因过度努力而透支自己。",gift:"拥有强大的执行力和将想法变为现实的能力。",image:"./oh-cards/tuka/40.jpg",imageDescription:"两只手紧握著锤子和斧头在用力敲击，背景为炽烈的红色，象征着劳作中的力量与消耗。",interpretation:{subconscious:"你的内心正处于一个‘动手去做’的阶段。这张图卡可能代表你正在为某个目标付出巨大的努力，也可能象征着你内心某种旧有结构正在被打破。",emotion:"专注、疲惫、也可能带着某种发泄的快感。劳作的过程既是创造，也是一种情绪的出口。",relationship:"在关系中，你是否是那个总是在‘修理’、‘建设’或‘付出’的人？有时候，过度的努力反而会让对方感到压力。",growth:"成长需要努力，但也需要智慧地选择努力的对象。问问自己：你正在建造的是什么？这是你真正想要的吗？"},questions:["你目前正在‘敲打’什么？它值得你投入这么多力气吗？","劳作带给你更多的是成就感，还是疲惫感？","如果你可以放下手中的工具休息一会儿，你会想做什么？"]},{id:"img6",realId:50,name:"隐藏之面",keywords:["面具","阴影","隐藏","陌生","恐惧"],deepSeekKeywords:["人格面具","阴影自我","陌生感","内在恐惧","荣格阴影","真实与虚假"],shadow:"过度认同面具而遗忘了真实的自己，或将阴影投射到他人身上。",gift:"面具也是一种保护机制，它帮助我们在复杂的社会中生存下来。",image:"./oh-cards/tuka/50.jpg",imageDescription:"一张黑色的面孔，只有眼睛散发着诡异的黄色光芒，头顶似乎有框架，象征着我们隐藏的阴影面或社会面具。",interpretation:{subconscious:"你的内心有一个不愿意被看见的部分。这张图卡象征着你的阴影（Shadow）——那些被压抑、否认或隐藏起来的特质。它不见得是坏的，只是你还没有准备好接纳它。",emotion:"恐惧、疏离，或者一种奇异的吸引力。面对阴影时，我们往往会感到不舒服，但这正是整合的开始。",relationship:"这张牌可能暗示你在某段关系中戴着面具，或者你感觉某个人让你触及了自己不愿意面对的部分。",growth:"成长是逐渐摘下面具，与自己的阴影和解。当你能够温柔地凝视这张黑脸时，你就已经迈出了重要的一步。"},questions:["这张黑色的面孔让你联想到什么？是某个人，还是你自己的某个面向？","你有多少比例的真实自我是藏在面具后面的？","如果你对这张黑脸说一句话，你会说什么？"]},{id:"img7",realId:60,name:"车窗告别",keywords:["分离","离别","过渡","挥手","远行"],deepSeekKeywords:["分离焦虑","人生过渡","离别与重逢","放手与祝福","依恋理论","哀悼与释怀","新旅程"],shadow:"对分离的过度恐惧，或因无法告别而困在过去。",gift:"每一次告别都为新的相遇腾出了空间，也让我们更珍惜曾经的连结。",image:"./oh-cards/tuka/60.jpg",imageDescription:"一个人在车窗外向车内的人挥手，黄绿色的车身斜穿画面，象征着一场正在进行的离别或相遇。",interpretation:{subconscious:"你的生命中正在经历或即将经历一场过渡。这张图卡象征着分离、告别，或是某种关系型态的转变。挥手既是再见，也是祝福。",emotion:"淡淡的忧伤、不舍，但也可能有一种如释重负的感觉。告别总是复杂的，它混合了爱与痛。",relationship:"这张牌可能映照你某段关系的现状——是谁在离开？是谁在留守？理解双方的位置，可以帮助你更好地处理这份情绪。",growth:"成长就是不断地学会告别。不是每段关系都会永远持续，但每一段关系的意义都会永远留在我们的生命里。"},questions:["这个挥手的场景让你联想到生活中的哪一次离别或相遇？","如果你是画面中的人，你会选择离开，还是选择留守？","这场告别之后，你希望迎来什么样的新开始？"]},{id:"img8",realId:70,name:"家庭背影",keywords:["家庭","归属","等待","关系","角色"],deepSeekKeywords:["家庭系统","归属感","家庭角色","亲密关系","原生家庭","依恋模式","代际传递"],shadow:"在家庭角色中迷失自我，或被家庭的期待所束缚。",gift:"家庭是我们最初的学校，它教会我们爱与被爱，也给了我们扎根的基础。",image:"./oh-cards/tuka/70.jpg",imageDescription:"三个人（两个大人和一个小孩）背对着观众站立，望向远方，象征着家庭的连结与共同的视线。",interpretation:{subconscious:"家庭是你内心世界的重要主题。这张图卡可能反映了你对原生家庭的感受，也可能象征着你目前正在经营的家庭关系。三个人的背影代表着一种共同体的意识。",emotion:"温暖、安全，也可能有一种说不出口的孤独。即使在家庭之中，我们有时也会感到自己是独自一人。",relationship:"这张牌邀请你思考：你在家庭中扮演什么角色？这个角色是你自己选择的，还是被分配的？你在家中感到被看见了吗？",growth:"成长是逐渐从家庭中分化出来，成为一个独立而完整的个体，同时也保持着爱的连结。"},questions:["这三个背影让你联想到谁？他们之间的关系是怎样的？","你在家庭中最常扮演的角色是什么？这个角色让你感到疲惫还是满足？","如果你可以对这个家庭说一句话，你会说什么？"]},{id:"img9",realId:80,name:"剪断束缚",keywords:["切割","分离","决断","结束","解放"],deepSeekKeywords:["决断力","设定界限","结束与开始","切断连结","自我保护","说不的勇气","解放自我"],shadow:"用伤害性的方式切断关系，或因害怕痛苦而迟迟不敢剪断。",gift:"拥有结束不健康连结的勇气，为自己创造更清晰的人生界限。",image:"./oh-cards/tuka/80.jpg",imageDescription:"一只手紧握著剪刀，在鲜红色的背景下准备剪断某物，象征着决断、切割与结束的力量。",interpretation:{subconscious:"你的内心深处知道，某些东西需要被剪断。这可能是一段关系、一种习惯、一个执念，或是一份不再适合你的工作。剪刀象征着你内在的决断力。",emotion:"紧张、释然、也可能带着一丝罪恶感。切割总是伴随着痛楚，但这份痛楚是为了更大的自由。",relationship:"这张牌可能暗示你需要在某段关系中设定更清晰的界限。有时候，爱自己最好的方式，就是学会说‘不’，或者学会离开。",growth:"成长需要勇气去结束那些已经不再滋养我们的事物。信任你的直觉，当你准备好了，剪刀就在你手中。"},questions:["你生活中有哪些‘线’需要被剪断？是什么在阻止你动手？","剪断之后，你担心会失去什么？又期待会获得什么？","你是否有足够的勇气为自己设定清晰的界限？"]},{id:"img10",realId:88,name:"播种希望",keywords:["播种","耕耘","希望","未来","创造"],deepSeekKeywords:["投资未来","播种与收获","创造力","耐心与信任","生命周期","自我实现","希望心理学"],shadow:"因急于求成而无法耐心等待，或因害怕失败而不敢播下第一颗种子。",gift:"拥有创造未来的能力和相信生命会回应你的信任。",image:"./oh-cards/tuka/88.jpg",imageDescription:"一位戴着草帽、身穿蓝衣的人在金黄色的田地里播撒种子，象征着耕耘、创造与对未来的希望。",interpretation:{subconscious:"你的内心正处于一个‘播种期’。这张图卡象征着你正在为未来创造一些东西，无论是一个计划、一段关系，还是一个新的自己。土地是丰饶的，只要你愿意耕耘。",emotion:"踏实、希望、也可能有一丝对收获的不确定。播种的时刻是安静而神圣的，它要求我们信任自然的节奏。",relationship:"在关系中，你正在播下什么样的种子？是信任、理解、还是批评与冷漠？记住，你收获的往往是你曾经播下的。",growth:"成长不是一夜之间发生的。像农夫一样，给自己时间，给目标时间。每一天的小努力，都是在为未来的丰收做准备。"},questions:["你目前正在播下什么样的种子？它们需要什么样的环境才能发芽？","你对收获有足够的耐心吗？还是你常常急于看到结果？","如果这片田地代表你的人生，你希望它长出什么样的风景？"]},{id:"img11",realId:11,name:"归巢",keywords:["归属","安全","疲惫","休憩","接纳"],deepSeekKeywords:["归属感","安全基地","自我照顾","休息与恢复","依恋理论","内在避风港","接纳自我"],shadow:"过度退缩到舒适区而逃避挑战，或将‘家’的概念过度理想化。",gift:"懂得为自己创造一个可以放松、充电的空间，这是内在力量的来源。",image:"./oh-cards/tuka/11.jpg",imageDescription:"一个温暖的圆形巢穴意象，象征着归属、安全与被接纳的空间。",interpretation:{subconscious:"你的内心深处正在呼唤一个可以安放自己的地方。不一定是物理空间，而是一种‘被接纳’、‘不必解释’的感觉。",emotion:"温柔、渴望，也许还有一点忧伤。这种情绪像是一句没有说出口的话：‘我也想要被照顾。’",relationship:"你正在重新审视哪些关系让你感到‘像回家一样’，哪些让你更加疲惫。",growth:"学会休息和示弱，是一种被低估的力量。你不需要一直坚强。"},questions:["你上一次感到‘完全放松’是什么时候？","什么样的地方、什么样的人，会让你觉得‘像回家一样’？","你是否允许自己在他人面前展现脆弱？"]},{id:"img12",realId:12,name:"镜湖",keywords:["反思","平静","真相","自我","觉察"],deepSeekKeywords:["自我反思","平静心态","认识真我","内在觉察","正念冥想","真实自我","心理投射"],shadow:"过度反思导致的反刍与停滞，或因害怕真相而不敢凝视湖面。",gift:"拥有透过平静看清真相的能力，能够在混乱中保持内在的澄澈。",image:"./oh-cards/tuka/12.jpg",imageDescription:"一面平静如镜的湖水，映照着天空与周围的景色，象征着自我觉察与内在真相。",interpretation:{subconscious:"湖面如镜，映照的不仅是天空，还有你对自己的认知。这张牌邀请你停下来，去看一看那个你已经很久没有认真凝视的自己。",emotion:"平静中带着一丝不易察觉的波动。当我们真正面对自己时，往往会发现一些被忽略已久的情绪。",relationship:"你目前的人际关系，是否像一面镜子，照出了你内心深处的某些信念？",growth:"自我觉察是成长的起点。看见真实的自己，包括那些不完美的部分，是一种温柔的勇气。"},questions:["如果湖水能映照出你最真实的一面，你最希望看见什么？又最害怕看见什么？","最近一次‘认识自己’的时刻，是什么触发了它？","你是如何对待自己的‘缺点’的？"]},{id:"img13",realId:13,name:"火种",keywords:["热情","渴望","创造","消耗","光芒"],deepSeekKeywords:["内在热情","创造驱力","生命能量","自我实现","激情管理","燃烧与耗竭"],shadow:"因压抑热情而产生的焦躁，或因过度燃烧而导致的身心耗竭。",gift:"内心拥有一团不灭的火焰，它指引着你朝向真正渴望的方向前进。",image:"./oh-cards/tuka/13.jpg",imageDescription:"一簇跳动的火焰，象征着内在的热情、创造力与生命的活力。",interpretation:{subconscious:"你的内心有一团火焰，它代表着你的热情、渴望，或是某个尚未实现的梦想。",emotion:"炽热、激动，或者因为压抑而带来的焦躁。火的本质是向上的。",relationship:"你在关系中投入了怎样的热情？是双向的温暖，还是单方面的燃烧？",growth:"找到让你燃烧的事情，并给它空间。同时也要学会保护自己，不要在一次燃烧中耗尽所有的能量。"},questions:["上一次让你‘眼睛发亮’的事情是什么？","你的生活中，有什么正在消耗你的热情？","如果给心里的那团火一个名字，你会叫它什么？"]},{id:"img14",realId:14,name:"根系",keywords:["根基","原生家庭","连接","滋养","来处"],deepSeekKeywords:["原生家庭","家族传承","安全感根基","依附关系","根源探索","扎根与成长"],shadow:"被过去束缚而无法展翅，或切断与根的连结而漂泊不定。",gift:"从根源中汲取力量，同时也拥有选择哪些传承要延续、哪些要放下的自由。",image:"./oh-cards/tuka/14.jpg",imageDescription:"一棵大树深深扎根于土壤之中，象征着与过去、家庭和内在安全感的连结。",interpretation:{subconscious:"你的过去构成了你的根基。它既滋养着你，也可能在某些时刻限制着你。",emotion:"深深的眷恋，或是复杂的情感交织。我们对根系的情感往往是爱与痛的混合体。",relationship:"你在亲密关系中重复的模式，往往可以从原生家庭中找到线索。",growth:"扎根不是为了停留，而是为了更好地向上生长。当你了解自己的根，你就能更坚定地成为自己。"},questions:["从原生家庭里，你继承了哪些宝贵的品质？又有哪些你想要放下的模式？","你如何定义‘家’？这个定义是从哪里来的？","你现在的生活，是在延续某个家族故事，还是在书写新的篇章？"]},{id:"img15",realId:15,name:"风暴",keywords:["混乱","变革","释放","洗礼","转折"],deepSeekKeywords:["生命风暴","剧变与转型","情绪释放","危机即转机","韧性培养","破坏与重建"],shadow:"在风暴中迷失方向，或因抗拒变化而增加不必要的痛苦。",gift:"风暴具有清洗和更新的力量，它会吹散旧有的结构，为新的可能腾出空间。",image:"./oh-cards/tuka/15.jpg",imageDescription:"一道闪电划破天空，象征着突如其来的变化、情绪的爆发与生命的转折。",interpretation:{subconscious:"你的内心或生活正在经历一场风暴。它可能表现为情绪的剧烈波动、关系的冲突，或是外界环境的突然变化。",emotion:"混乱、恐惧、愤怒，或是某种终于爆发出来的真实。风暴中的情绪往往是被压抑已久的。",relationship:"风暴可能会动摇一些关系，但也会让真正坚固的连结更加清晰。",growth:"风暴不是惩罚，而是转折。它打破旧有的结构，为新的可能性腾出空间。"},questions:["你正在经历或刚刚经历的风暴，它最想打破的是什么？","风暴中，你发现了自己哪些未曾了解的侧面？","当风暴平息后，你希望留下什么，又希望带走什么？"]},{id:"img16",realId:16,name:"桥梁",keywords:["连接","沟通","跨越","中间地带","过渡"],deepSeekKeywords:["关系桥梁","沟通艺术","人生过渡","整合对立","中间地带","连结与疏离"],shadow:"永远停留在桥上而不敢走向任何一边，或成为别人的桥梁却忽略了自己的需求。",gift:"拥有连结不同世界、沟通对立双方的能力，是和平的缔造者。",image:"./oh-cards/tuka/16.jpg",imageDescription:"一座拱桥横跨在两岸之间，象征着连结、沟通与从一个状态过渡到另一个状态。",interpretation:{subconscious:"你正处于两个世界之间，或者你内心某个部分的连结正在建立。桥梁意味着你不是非此即彼，而是可以在差异之间找到通路。",emotion:"悬而未决的感觉，但同时也蕴含着希望。站在桥上的人，既看见了来时的路，也望见了对岸的风景。",relationship:"这张牌提示沟通的重要性。也许你需要成为一座桥，连接两个难以理解彼此的人。",growth:"成长常常发生在‘之间’——在已知与未知之间，在旧我与新我之间。学会在桥梁上停留，也是一种智慧。"},questions:["你生活中有哪些‘对立’的部分，正在等待一座桥梁？","如果有一座桥可以连接你和某个理想状态，那座桥会是什么？","你是否愿意走向对岸？是什么在推动你，又是什么在拉住你？"]},{id:"img17",realId:17,name:"茧房",keywords:["保护","隔离","酝酿","蜕变","孤独"],deepSeekKeywords:["自我保护","蜕变期","孤独的价值","内在酝酿","破茧而出","安全与限制"],shadow:"因恐惧外界而长期躲在茧中，错过了蜕变的时机。",gift:"懂得给自己创造一个安全的空间，专注于内在的转化与成长。",image:"./oh-cards/tuka/17.jpg",imageDescription:"一个温暖而封闭的茧，象征着暂时的退隐、保护与为蜕变做准备的时期。",interpretation:{subconscious:"你的内心需要一个茧房——一个可以暂时与外界保持距离、专注于内在变化的空间。",emotion:"安全但也有些孤独。茧房的温暖让人安心，但长时间待在里面也会让人感到窒息。",relationship:"你可能正在经历一段需要独处的时期，或者你感到在某些关系中不得不‘缩回壳里’。",growth:"每一次蜕变都需要一个黑暗而安静的过程。相信自己内在的时钟，当你准备好了，自然会破茧而出。"},questions:["你的‘茧房’是什么样的？它给你带来了安全感，还是孤独感？","你正在酝酿什么样的变化？","是什么信号会让你知道，你已经准备好破茧而出了？"]},{id:"img18",realId:18,name:"星辰",keywords:["指引","梦想","遥远","仰望","希望"],deepSeekKeywords:["人生梦想","希望感","意义追寻","理想与现实","灵性指引","长远目标"],shadow:"因梦想过于遥远而感到沮丧，或因沉迷幻想而忽略脚下的路。",gift:"心中拥有能够照亮黑暗的星辰，它让生命充满意义与方向。",image:"./oh-cards/tuka/18.jpg",imageDescription:"一颗明亮的星星在夜空中闪耀，象征着梦想、希望与远方的指引。",interpretation:{subconscious:"你的心中有一颗或几颗星辰，它们代表着你的理想、向往，或是那些让你觉得生命有意义的东西。",emotion:"向往、略带忧伤的美好。星辰的光芒既温暖又遥远，这种距离感本身也是一种诗意的体验。",relationship:"你心中的星辰是否照亮了你与他人的关系？或者，你是否在关系中丢失了对星辰的仰望？",growth:"梦想的价值不在于立刻实现，而在于它指引你前行的方向。即使永远无法抵达，走在通往星辰的路上，本身就是一种丰盈的人生。"},questions:["你心中的‘星辰’是什么？它是什么时候第一次出现在你生命里的？","日常生活中的忙碌，是否让你忘记了仰望？","如果那颗星辰能够实现一个愿望，你希望它是什么？"]},{id:"img19",realId:19,name:"河流",keywords:["流动","时间","顺应","变迁","释然"],deepSeekKeywords:["生命流动","时间治愈","顺应自然","放下执著","情绪流动","接纳变化"],shadow:"执著于某个不变的状态，与生命的自然节奏对抗。",gift:"懂得像水一样柔软适应，在变化中找到前进的力量。",image:"./oh-cards/tuka/19.jpg",imageDescription:"蜿蜒的河流在大地上流淌，象征着时间、变化与生命的自然节奏。",interpretation:{subconscious:"生命之河从不停歇。这张牌提醒你，一切都会过去，一切都会到来。执著于某个固定的状态，只会让我们与生命的自然节律对抗。",emotion:"流动带来的释然，也可能伴随着对消逝的淡淡哀伤。河水流过，带走了什么，也带来了什么。",relationship:"关系也是一条流动的河。顺应流动，而不是强行控制，才能让关系更长久。",growth:"学会像水一样柔软和适应，是一种深刻的智慧。你无法阻止河流的方向 你是一位资深的箱庭疗法（Sandplay Therapy）咨询师，深受多拉·卡尔夫（Dora Kalff）与荣格分析心理学（Jungian Analytical Psychology）训练。你的咨询风格温暖、抱持、非评判，深谙"自由与受保护的空间"之精髓。你熟谙原型象征、空间象征（中心/边缘、左/右、上/下）、自性（Self）之涌现，以及创伤知情（trauma-informed）原则。你不会给出诊断性标签，而是通过隐喻与象征，陪伴来访者进行自我探索。

【创伤知情与安全边界】
1. 避免给出精神科诊断或确定性预言。
2. 若作品呈现强烈冲突、孤立或创伤象征，请以温柔、稳定的方式回应，强调"这些感受可以被命名、被承载"。
3. 鼓励来访者寻求线下专业心理咨询的支持，尤其是在情绪难以自我调节时。
4. 所有解读都应以邀请式、开放式语言呈现，避免"你就是这样"的绝对化表述。

【输出结构】
请用中文撰写，语气温和、富有同理心，结构清晰，包含以下五个部分：
1. 作品概览（约300字）：整体氛围与能量感受。
2. 空间与结构分析（约400字）：基于中心/边缘、左/右、上/下、四角的分布进行解读。
3. 象征与主题解读（约400字）：结合沙具类别、主题及原型象征进行深度分析。
4. 温暖的内在洞察（约300字）：情感共鸣与关系/自我状态的映照。
5. 成长建议与整合方向（约300字）：可操作的练习或思考方向，引导整合。
